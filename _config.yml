# Site settings
title: "Research Archive: Consciousness & Quantum Studies"
description: "Exploratory research into consciousness field theory, quantum amplification, and temporal dynamics"
author: "Independent Research"
email: ""
baseurl: "/Research-Archive"
url: "https://pelicansperspective.github.io"

# Build settings
markdown: kramdown
highlighter: rouge
remote_theme: pages-themes/cayman@v0.2.0

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-relative-links

# SEO and metadata
lang: en-US
keywords: "consciousness field hypothesis, quantum consciousness amplification, hyperchronal quantum theory, consciousness research, quantum physics, theoretical frameworks"
social:
  name: Research Archive
  links:
    - https://github.com/PelicansPerspective/Research-Archive

# Google Analytics (add your tracking ID when ready)
# google_analytics: UA-XXXXXXXX-X

# Navigation
navigation:
  - title: "Home"
    url: "/"
  - title: "Frameworks"
    url: "/frameworks"
  - title: "Research Projects"
    url: "/research"
  - title: "Complete Archive"
    url: "/archive"
  - title: "Search"
    url: "/search"
  - title: "Collaboration"
    url: "/collaboration"

# Header pages

# Collections
collections:
  papers:
    output: true
    permalink: /:collection/:name/
  projects:
    output: true
    permalink: /:collection/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "papers"
    values:
      layout: "paper"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"

# Exclude from processing
exclude:
  - "*.pdf"
  - "*.py"
  - "*.tex"
  - "*.csv"
  - "*.ipynb"
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
